spring.application.name=API-GATEWAY
server.port=9191

eureka.client.serverUrl.defaultZone=http://localhost:8761/eureka/
management.endpoints.web.exposure.include=*

#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true
#logging.level.org.springframework.cloud.gateway.handled.RoutePredicateHandlerMapping=DEBUG

#Routes for employee service
#we can also use spring.cloud.gate.routes[0].predicates[0].uri=http://localhost:8081/employee/**
#But we are using load balancer to route the request to the employee service and department service
#then we need to use service name instead of url, and we need to use lb:// prefix to tell the gateway that we are using load balancer

# Routes for Employee Service
spring.cloud.gateway.routes[0].id=EMPLOYEE-SERVICE
spring.cloud.gateway.routes[0].uri=lb://EMPLOYEE-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/employees/**

## Routes for Department Service
spring.cloud.gateway.routes[1].id=DEPARTMENT-SERVICE
spring.cloud.gateway.routes[1].uri=lb://DEPARTMENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/departments/**

